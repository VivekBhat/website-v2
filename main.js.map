<div class="profile-page">
  <div class="wrapper">
    <div class="page-header page-header-small" filter-color="green">
      <div class="page-header-image" data-parallax="true"
           style="background-image: url('../../../assets/images/intro.jpg');">
      </div>
      <div class="container">
        <div class="content-center">
          <div class="cc-profile-image">
            <a href="#">
              <img src="../../../assets/images/img1.JPG" alt="Image"/>
            </a>
          </div>
          <div class="h2 title">Vivek Bhat</div>
          <p class="category text-white">Software Engineer II, Amazon</p>
          <a class="btn btn-primary smooth-scroll mr-2" (click)="onClick('contact')" data-aos="zoom-in"
             data-aos-anchor="data-aos-anchor">Contact Me</a>
          <a class="btn btn-primary"
             href="../../../assets/resume/Resume_Vivek_Bhat.pdf" target="_blank"
             data-aos="zoom-in" data-aos-anchor="data-aos-anchor">Resume</a>
        </div>
      </div>
      <div class="section">
        <div class="container">
          <div class="button-container">
            <!--<a class="btn btn-default btn-round btn-lg btn-icon" href="https://www.facebook.com/vivekbhat"-->
            <!--target="_blank" rel="tooltip" title="Follow me on Facebook">-->
            <!--<i class="fa fa-facebook"></i>-->
            <!--</a>-->
            <a class="btn btn-default btn-round btn-lg btn-icon" href="https://www.instagram.com/vivek_bhat_/"
               target="_blank" rel="tooltip" title="Follow me on Instagram">
              <i class="fa fa-instagram"></i>
            </a>
            <a class="btn btn-default btn-round btn-lg btn-icon" href="https://www.linkedin.com/in/vivek-bhat/"
               target="_blank" rel="tooltip" title="Follow me on Linkedin">
              <i class="fa fa-linkedin"></i>
            </a>
            <a class="btn btn-default btn-round btn-lg btn-icon" href="https://github.com/vivekbhat"
               target="_blank" rel="tooltip" title="Follow me on Github">
              <i class="fa fa-github"></i>
            </a>
            <a class="btn btn-default btn-round btn-lg btn-icon" href="https://twitter.com/bhat175"

            </a>
